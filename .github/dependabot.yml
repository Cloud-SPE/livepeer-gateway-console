# Dependabot config. Auto-PRs on dep + base-image + action-version
# bumps so security patches and minor updates don't rely on a human
# noticing.
#
# Schema:
#   https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Watched ecosystems:
#   1. npm (root)         — server deps + the lint-plugin workspace
#   2. npm (/admin-ui)    — SPA install root (separate lockfile;
#                           workspaces inside: shared, admin)
#   3. docker             — Dockerfile base images (node:20-bookworm-slim,
#                           gcr.io/distroless/nodejs20-debian12)
#   4. github-actions     — workflow action versions
#
# Strategy: group minor + patch updates per ecosystem so each Monday
# brings at most one PR per ecosystem rather than ten. Major updates
# come as their own PR(s); coupled-pair majors (fastify ↔ @fastify/*,
# vitest ↔ @vitest/*, drizzle-orm ↔ drizzle-kit) are also grouped so
# dependabot opens ONE coordinated PR with the whole set bumped together
# rather than three failing PRs that can't merge in isolation.
#
# Why groups instead of ignores: ignoring a major bump forever just
# kicks the can — a known security fix or compat bump quietly piles up.
# Grouping lets dependabot keep us informed; the PR may still need
# manual code work for API churn (and may close-with-comment when it
# does), but at least we see it.
#
# CI gates every PR (lint + typecheck + 78 tests + build) so a
# breaking bump shows up before merge.

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
      prefix-development: deps-dev
      include: scope
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      # fastify v5 shifts the plugin API; every @fastify/* must move
      # together or npm ci ERESOLVEs. One coordinated PR.
      fastify-major:
        patterns:
          - "fastify"
          - "@fastify/*"
        update-types:
          - major
      # @vitest/coverage-v8 peer-pins vitest exactly; bumping either
      # one alone ERESOLVEs (we hit this on the v0.1.x sweep).
      vitest-major:
        patterns:
          - "vitest"
          - "@vitest/*"
        update-types:
          - major
      # drizzle-orm + drizzle-kit ship in lockstep from the same
      # monorepo; bumping one without the other invites schema/runtime
      # skew. (Already true at the minor level; explicit at major.)
      drizzle-major:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
        update-types:
          - major
    ignore:
      # @types/node tracks the runtime; we're on Node 20 LTS so types
      # stay on ^20. Skipping the auto-bump means we don't get spurious
      # weekly PRs to ^21+. Re-evaluate when we move off Node 20 LTS.
      # (This is genuinely a Node-version-pin coupling, not an "API
      # churn we'll deal with later" excuse — keep as ignore.)
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # SPA workspace — separate npm install root with its own lockfile.
  - package-ecosystem: npm
    directory: /admin-ui
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - spa
    commit-message:
      prefix: deps(admin-ui)
      prefix-development: deps-dev(admin-ui)
      include: scope
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: deps(docker)
    ignore:
      # Stay on Node 20 LTS (Active LTS through Apr 2026, Maintenance
      # through Apr 2026). Bump manually when we move to Node 22 / 24.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
      # Distroless tag follows the Node major; same LTS rationale.
      - dependency-name: "gcr.io/distroless/nodejs*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci(actions)
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
