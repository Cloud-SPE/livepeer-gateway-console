# Build and push the runtime image to Docker Hub.
#
# Triggers
#   - push tag v*.*.* -> :<version>, :<major>.<minor>, :latest
#
# Releases are explicit — only annotated semver tags produce images.
# Push to main runs CI (gates the merge) but does NOT publish to
# Docker Hub. To cut a release: `git tag v0.1.1 && git push origin v0.1.1`.
#
# The job re-runs the same lint/typecheck/test gate as ci.yml before
# touching the registry — a broken image must never land on Docker Hub.
#
# Required repo secrets
#   - DOCKERHUB_USERNAME (Docker Hub user that owns the tztcloud namespace)
#   - DOCKERHUB_TOKEN    (Docker Hub access token, NOT the account password)

name: Deploy

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

env:
  IMAGE: tztcloud/livepeer-gateway-console

jobs:
  publish:
    name: build & push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # ---- Validate before publishing ------------------------------------
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspaces (root + bridge-ui/*)
        run: npm ci

      - name: Format check (prettier)
        run: npm run fmt:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with 75% coverage floor)
        run: npm test

      # ---- Build & push ---------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
